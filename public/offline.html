<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B4D3E" />
    <title>Offline — Jobabroad</title>
    <style>
      :root {
        --bg: #1b4d3e;
        --cream: #f8f5f0;
        --orange: #ff751f;
        --muted: #cfe0d9;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--cream);
        font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 28rem; }
      .logo {
        font-family: Oswald, system-ui, sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 1.75rem;
        margin: 0 0 1.5rem;
      }
      .logo .abroad { color: var(--orange); }
      h1 {
        font-family: Oswald, system-ui, sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
      }
      p { color: var(--muted); line-height: 1.6; margin: 0 0 1.75rem; }
      button {
        background: var(--orange);
        color: #fff;
        border: 0;
        border-radius: 9999px;
        padding: 0.85rem 1.75rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="logo">job<span class="abroad">abroad</span></p>
      <h1>You're offline</h1>
      <p>
        We can't reach Jobabroad right now. Check your connection and try again —
        your saved pages are still available once you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
